<!DOCTYPE html>
<!-- saved from url=(0033)file:///D:/Descargas/index_2.html -->
<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Casa de Papel — Puntuación</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;700;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #CC0000; --red-dark: #990000;
    --black: #111; --white: #fff;
    --gray-light: #F4F4F2; --gray-mid: #E0DED8; --gray-text: #888;
    --bronze: #8B5E2E; --radius: 10px;
    --D: 'Bebas Neue', Impact, sans-serif;
    --B: 'Barlow', Arial, sans-serif;
  }
  body { background: var(--black); font-family: var(--B); min-height: 100vh; display: flex; justify-content: center; }
  #app { width: 100%; max-width: 900px; min-height: 100vh; background: var(--white); display: flex; flex-direction: column; }
  .header { background: var(--black); padding: 20px 24px 16px; text-align: center; }
  .logo { font-family: var(--D); font-size: 48px; letter-spacing: 3px; color: var(--white); line-height: 1; }
  .logo span { background: var(--red); padding: 2px 10px 0; border-radius: 4px; font-size: 42px; margin: 0 4px; display: inline-block; vertical-align: middle; }
  #screen { flex: 1; padding: 24px 24px 48px; }

  /* SETUP */
  .q { font-family: var(--D); font-size: 64px; letter-spacing: 3px; text-align: center; margin-bottom: 32px; line-height: 1; color: var(--black); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 420px; margin: 0 auto; }
  .nbtn { background: var(--gray-light); border: 2px solid var(--gray-mid); border-radius: var(--radius); padding: 22px 0; font-family: var(--D); font-size: 72px; line-height: 1; color: var(--black); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .nbtn:active { background: var(--red); border-color: var(--red); color: var(--white); transform: scale(0.97); }
  .mbtn { grid-column: span 2; background: var(--black); border: 2px solid var(--black); border-radius: var(--radius); padding: 22px 8px; font-family: var(--D); font-size: 34px; letter-spacing: 1px; color: var(--white); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .mbtn:active { background: var(--red); border-color: var(--red); transform: scale(0.97); }

  /* SCORER */
  .backbtn { display: block; width: 100%; margin-bottom: 16px; padding: 12px; background: transparent; border: 1.5px solid var(--gray-mid); border-radius: var(--radius); font-family: var(--B); font-size: 15px; color: var(--gray-text); cursor: pointer; text-align: center; }
  .backbtn:active { background: var(--gray-light); }
  .thead { display: grid; grid-template-columns: 52px 1fr 110px; gap: 10px; padding: 0 10px 10px; border-bottom: 2px solid var(--black); margin-bottom: 12px; }
  .thead span { font-family: var(--D); font-size: 18px; letter-spacing: 1px; color: var(--gray-text); }
  .trow { display: grid; grid-template-columns: 52px 1fr 110px; gap: 10px; align-items: center; padding: 10px; border: 1.5px solid var(--gray-mid); border-radius: var(--radius); margin-bottom: 10px; background: var(--white); }
  .trow:focus-within { border-color: var(--red); }
  .tnum { width: 44px; height: 44px; background: var(--black); color: var(--white); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: var(--D); font-size: 24px; margin: 0 auto; }
  .iname, .ibills { background: var(--gray-light); border: 1px solid var(--gray-mid); border-radius: 8px; padding: 11px 12px; font-family: var(--B); font-size: 16px; color: var(--black); width: 100%; outline: none; }
  .iname:focus, .ibills:focus { border-color: var(--red); background: var(--white); }
  .iname::placeholder, .ibills::placeholder { color: #bbb; }
  .ibills { text-align: right; font-weight: 700; font-size: 17px; }
  .pbtn { width: 100%; margin-top: 16px; padding: 20px; background: var(--red); color: var(--white); border: none; border-radius: var(--radius); font-family: var(--D); font-size: 34px; letter-spacing: 3px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .pbtn:active { background: var(--red-dark); transform: scale(0.98); }

  /* PODIO ESCALERA */
  .slabel { font-family: var(--D); font-size: 30px; letter-spacing: 2px; color: var(--gray-text); text-align: center; margin-bottom: 16px; }
  .escalera { display: flex; align-items: flex-end; justify-content: center; gap: 4px; margin: 8px 0 32px; width: 100%; }
  .eblock { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1; min-width: 0; }
  .eplabel { font-family: var(--D); font-size: 13px; letter-spacing: 1px; margin-bottom: 3px; text-align: center; white-space: nowrap; }
  .eeq { font-size: 10px; color: var(--gray-text); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
  .ename { font-family: var(--D); font-size: 15px; letter-spacing: 0.5px; color: var(--black); text-align: center; margin-bottom: 2px; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 2px; }
  .ebills { font-family: var(--D); font-size: 14px; margin-bottom: 5px; color: var(--black); text-align: center; }
  .estand { width: 100%; border-radius: 4px 4px 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 8px; }
  .emedal { font-size: 22px; }

  /* colores de las columnas de la escalera - se asignan por posición en sorted */
  .estand-1  { background: var(--red); }
  .estand-2  { background: #555; }
  .estand-3  { background: var(--bronze); }
  .estand-last { background: #999; }
  .estand-mid  { background: #bbb; }

  .plabel-1    { color: var(--red); }
  .plabel-2    { color: #555; }
  .plabel-3    { color: var(--bronze); }
  .plabel-last { color: #777; }
  .plabel-mid  { color: #aaa; }

  /* CLASIFICACIÓN */
  .divider { height: 2px; background: var(--black); margin-bottom: 16px; }
  .rrow { display: grid; grid-template-columns: 40px 40px 1fr 72px; gap: 10px; align-items: center; padding: 12px 10px; border-radius: var(--radius); margin-bottom: 8px; border: 1.5px solid var(--gray-mid); }
  .rrow.r1 { border-color: var(--red); background: #fff5f5; }
  .rrow.r2 { border-color: #999; background: #f8f8f8; }
  .rrow.r3 { border-color: var(--bronze); background: #fdf8f2; }
  .rpos { font-family: var(--D); font-size: 22px; text-align: center; color: var(--gray-text); }
  .rpos.p1 { color: var(--red); }
  .rpos.p2 { color: #555; }
  .rpos.p3 { color: var(--bronze); }
  .rtnum { width: 34px; height: 34px; background: var(--black); color: var(--white); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: var(--D); font-size: 17px; }
  .rname { font-size: 16px; font-weight: 700; color: var(--black); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rbills { font-family: var(--D); font-size: 24px; color: var(--black); text-align: right; }
  .backbtn2 { width: 100%; margin-top: 20px; padding: 14px; background: transparent; border: 1.5px solid var(--gray-mid); border-radius: var(--radius); font-family: var(--B); font-size: 15px; color: var(--gray-text); cursor: pointer; }
  .backbtn2:active { background: var(--gray-light); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">LA CASA <span>DE</span> PAPEL</div>
  </div>
  <div id="screen"><div class="q">¿CUÁNTOS EQUIPOS?</div><div class="grid"><button class="nbtn" onclick="start(4)">4</button><button class="nbtn" onclick="start(6)">6</button><button class="nbtn" onclick="start(8)">8</button><button class="nbtn" onclick="start(10)">10</button><button class="nbtn" onclick="start(12)">12</button><button class="mbtn" onclick="setup(true)">MÁS EQUIPOS</button></div></div>
</div>
<script>
var teams = [];

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function setup(ext){
  var primary=[4,6,8,10,12], extra=[14,16,18,20,22,24];
  var opts = ext ? extra : primary;
  var btns = opts.map(function(n){ return '<button class="nbtn" onclick="start('+n+')">'+n+'</button>'; }).join('');
  var tog = ext
    ? '<button class="mbtn" onclick="setup(false)">← VOLVER</button>'
    : '<button class="mbtn" onclick="setup(true)">MÁS EQUIPOS</button>';
  document.getElementById('screen').innerHTML =
    '<div class="q">¿CUÁNTOS EQUIPOS?</div><div class="grid">'+btns+tog+'</div>';
}

function start(n){
  teams = [];
  for(var i=1;i<=n;i++) teams.push({num:i, name:'', bills:''});
  scorer();
}

function scorer(){
  var rows = teams.map(function(t){
    return '<div class="trow">'+
      '<div style="display:flex;align-items:center;justify-content:center"><div class="tnum">'+t.num+'</div></div>'+
      '<input class="iname" type="text" inputmode="text" autocomplete="off" placeholder="Nombre" value="'+esc(t.name)+'" onchange="saveName('+t.num+',this.value)">'+
      '<input class="ibills" type="number" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="0" value="'+esc(t.bills)+'" onchange="saveBills('+t.num+',this.value)">'+
    '</div>';
  }).join('');
  document.getElementById('screen').innerHTML =
    '<button class="backbtn" onclick="setup(false)">← Cambiar número de equipos</button>'+
    '<div class="thead"><span style="text-align:center">#</span><span>Equipo</span><span style="text-align:right">Billetes</span></div>'+
    rows+
    '<button class="pbtn" onclick="collectAndPodium()">VER PODIO</button>';
}

function saveName(num, val){
  var t = teams.find(function(x){ return x.num===num; });
  if(t) t.name = val;
}
function saveBills(num, val){
  var t = teams.find(function(x){ return x.num===num; });
  if(t) t.bills = val;
}

function collectAndPodium(){
  document.querySelectorAll('.trow').forEach(function(row){
    var ni = row.querySelector('.iname');
    var bi = row.querySelector('.ibills');
    if(!ni||!bi) return;
    var m = ni.getAttribute('onchange').match(/\d+/);
    if(!m) return;
    var num = parseInt(m[0]);
    var t = teams.find(function(x){ return x.num===num; });
    if(t){ t.name=ni.value; t.bills=bi.value; }
  });
  podium();
}

function podium(){
  var n = teams.length;
  // sorted 0=1st, n-1=last
  var sorted = teams.slice().sort(function(a,b){
    return (parseInt(b.bills)||0)-(parseInt(a.bills)||0);
  });

  // escalera ascendente: izquierda=último, derecha=primero
  // order in visual: last, ..., 3rd, 2nd, 1st
  var escOrder = sorted.slice().reverse(); // last first, first last

  // heights: leftmost (last) lowest, rightmost (1st) highest
  // We compute height proportionally
  var totalSteps = escOrder.length;
  var minH = 30, maxH = 160;

  var podHtml = escOrder.map(function(t, vi){
    var rank = sorted.indexOf(t); // 0=1st, n-1=last
    var height = Math.round(minH + (maxH - minH) * (vi / (totalSteps - 1 || 1)));

    // color and label by rank
    var standClass, labelClass, label, medal;
    if(rank === 0){
      standClass='estand-1'; labelClass='plabel-1'; label='1ER PUESTO'; medal='🥇';
    } else if(rank === 1){
      standClass='estand-2'; labelClass='plabel-2'; label='2º PUESTO'; medal='🥈';
    } else if(rank === 2){
      standClass='estand-3'; labelClass='plabel-3'; label='3ER PUESTO'; medal='🥉';
    } else if(rank === n-1){
      standClass='estand-last'; labelClass='plabel-last'; label='ÚLTIMO'; medal='';
    } else {
      standClass='estand-mid'; labelClass='plabel-mid'; label=(rank+1)+'º'; medal='';
    }

    return '<div class="eblock">'+
      '<div class="eplabel '+labelClass+'">'+label+'</div>'+
      '<div class="eeq">Eq. '+t.num+'</div>'+
      '<div class="ename">'+esc(t.name||'Equipo '+t.num)+'</div>'+
      '<div class="ebills">'+(parseInt(t.bills)||0)+'B</div>'+
      '<div class="estand '+standClass+'" style="height:'+height+'px">'+
        (medal ? '<span class="emedal">'+medal+'</span>' : '')+
      '</div>'+
    '</div>';
  }).join('');

  var rankHtml = sorted.map(function(t,i){
    var pc = i===0?'p1':i===1?'p2':i===2?'p3':'';
    var rc = i===0?'r1':i===1?'r2':i===2?'r3':'';
    return '<div class="rrow '+rc+'">'+
      '<span class="rpos '+pc+'">'+(i+1)+'º</span>'+
      '<div class="rtnum">'+t.num+'</div>'+
      '<span class="rname">'+esc(t.name||'Equipo '+t.num)+'</span>'+
      '<span class="rbills">'+(parseInt(t.bills)||0)+'</span>'+
    '</div>';
  }).join('');

  document.getElementById('screen').innerHTML =
    '<div class="slabel">PODIO FINAL</div>'+
    '<div class="escalera">'+podHtml+'</div>'+
    '<div class="divider"></div>'+
    '<div class="slabel">CLASIFICACIÓN COMPLETA</div>'+
    rankHtml+
    '<button class="backbtn2" onclick="scorer()">← Volver a editar</button>';
}

setup(false);
</script>


</body></html>
