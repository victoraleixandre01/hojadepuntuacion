<!DOCTYPE html>
<!-- saved from url=(0033)file:///D:/Descargas/index_1.html -->
<html lang="es"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>La Casa de Papel — Puntuación</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;700;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #CC0000; --red-dark: #990000;
    --black: #111; --white: #fff;
    --gray-light: #F4F4F2; --gray-mid: #E0DED8; --gray-text: #888;
    --bronze: #8B5E2E; --radius: 10px;
    --D: 'Bebas Neue', Impact, sans-serif;
    --B: 'Barlow', Arial, sans-serif;
  }
  body { background: var(--black); font-family: var(--B); min-height: 100vh; display: flex; justify-content: center; }
  #app { width: 100%; max-width: 480px; min-height: 100vh; background: var(--white); display: flex; flex-direction: column; }
  .header { background: var(--black); padding: 18px 16px 14px; text-align: center; }
  .logo { font-family: var(--D); font-size: 38px; letter-spacing: 2px; color: var(--white); line-height: 1; }
  .logo span { background: var(--red); padding: 2px 8px 0; border-radius: 4px; font-size: 34px; margin: 0 3px; display: inline-block; vertical-align: middle; }
  #screen { flex: 1; padding: 20px 16px 40px; }

  /* SETUP */
  .q { font-family: var(--D); font-size: 56px; letter-spacing: 3px; text-align: center; margin-bottom: 28px; line-height: 1; color: var(--black); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 340px; margin: 0 auto; }
  .nbtn { background: var(--gray-light); border: 2px solid var(--gray-mid); border-radius: var(--radius); padding: 20px 0; font-family: var(--D); font-size: 64px; line-height: 1; color: var(--black); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .nbtn:active { background: var(--red); border-color: var(--red); color: var(--white); transform: scale(0.97); }
  .mbtn { grid-column: span 2; background: var(--black); border: 2px solid var(--black); border-radius: var(--radius); padding: 20px 8px; font-family: var(--D); font-size: 30px; letter-spacing: 1px; color: var(--white); cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .mbtn:active { background: var(--red); border-color: var(--red); transform: scale(0.97); }

  /* SCORER */
  .backbtn { display: block; width: 100%; margin-bottom: 14px; padding: 10px; background: transparent; border: 1.5px solid var(--gray-mid); border-radius: var(--radius); font-family: var(--B); font-size: 14px; color: var(--gray-text); cursor: pointer; text-align: center; }
  .backbtn:active { background: var(--gray-light); }
  .thead { display: grid; grid-template-columns: 48px 1fr 100px; gap: 8px; padding: 0 8px 8px; border-bottom: 2px solid var(--black); margin-bottom: 10px; }
  .thead span { font-family: var(--D); font-size: 16px; letter-spacing: 1px; color: var(--gray-text); }
  .trow { display: grid; grid-template-columns: 48px 1fr 100px; gap: 8px; align-items: center; padding: 8px; border: 1.5px solid var(--gray-mid); border-radius: var(--radius); margin-bottom: 8px; background: var(--white); }
  .trow:focus-within { border-color: var(--red); }
  .tnum { width: 40px; height: 40px; background: var(--black); color: var(--white); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: var(--D); font-size: 22px; margin: 0 auto; }
  .iname, .ibills { background: var(--gray-light); border: 1px solid var(--gray-mid); border-radius: 8px; padding: 10px; font-family: var(--B); font-size: 15px; color: var(--black); width: 100%; outline: none; }
  .iname:focus, .ibills:focus { border-color: var(--red); background: var(--white); }
  .iname::placeholder, .ibills::placeholder { color: #bbb; }
  .ibills { text-align: right; font-weight: 700; font-size: 16px; }
  .pbtn { width: 100%; margin-top: 14px; padding: 18px; background: var(--red); color: var(--white); border: none; border-radius: var(--radius); font-family: var(--D); font-size: 30px; letter-spacing: 3px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .pbtn:active { background: var(--red-dark); transform: scale(0.98); }

  /* PODIUM */
  .slabel { font-family: var(--D); font-size: 26px; letter-spacing: 2px; color: var(--gray-text); text-align: center; margin-bottom: 12px; }
  .podwrap { display: flex; align-items: flex-end; justify-content: center; gap: 8px; margin: 8px 0 28px; height: 210px; }
  .pblock { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; flex: 1; }
  .plabel { font-family: var(--D); font-size: 16px; letter-spacing: 1px; margin-bottom: 3px; }
  .place-1 .plabel { color: var(--red); }
  .place-2 .plabel { color: #555; }
  .place-3 .plabel { color: var(--bronze); }
  .peq { font-size: 11px; color: var(--gray-text); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
  .pname { font-family: var(--D); font-size: 18px; letter-spacing: 0.5px; color: var(--black); text-align: center; margin-bottom: 2px; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pbills { font-family: var(--D); font-size: 16px; margin-bottom: 6px; color: var(--black); }
  .pstand { width: 100%; border-radius: 6px 6px 0 0; display: flex; align-items: flex-start; justify-content: center; padding-top: 10px; }
  .pmedal { font-size: 28px; }
  .place-1 .pstand { height: 130px; background: var(--red); }
  .place-2 .pstand { height: 95px; background: #555; }
  .place-3 .pstand { height: 65px; background: var(--bronze); }
  .divider { height: 2px; background: var(--black); margin-bottom: 14px; }
  .rrow { display: grid; grid-template-columns: 36px 36px 1fr 64px; gap: 8px; align-items: center; padding: 10px 8px; border-radius: var(--radius); margin-bottom: 6px; border: 1.5px solid var(--gray-mid); }
  .rrow.r1 { border-color: var(--red); background: #fff5f5; }
  .rrow.r2 { border-color: #999; background: #f8f8f8; }
  .rrow.r3 { border-color: var(--bronze); background: #fdf8f2; }
  .rpos { font-family: var(--D); font-size: 20px; text-align: center; color: var(--gray-text); }
  .rpos.p1 { color: var(--red); }
  .rpos.p2 { color: #555; }
  .rpos.p3 { color: var(--bronze); }
  .rtnum { width: 30px; height: 30px; background: var(--black); color: var(--white); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: var(--D); font-size: 15px; }
  .rname { font-size: 15px; font-weight: 700; color: var(--black); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rbills { font-family: var(--D); font-size: 22px; color: var(--black); text-align: right; }
  .backbtn2 { width: 100%; margin-top: 18px; padding: 12px; background: transparent; border: 1.5px solid var(--gray-mid); border-radius: var(--radius); font-family: var(--B); font-size: 14px; color: var(--gray-text); cursor: pointer; }
  .backbtn2:active { background: var(--gray-light); }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">LA CASA <span>DE</span> PAPEL</div>
  </div>
  <div id="screen"><div class="q">¿CUÁNTOS EQUIPOS?</div><div class="grid"><button class="nbtn" onclick="start(4)">4</button><button class="nbtn" onclick="start(6)">6</button><button class="nbtn" onclick="start(8)">8</button><button class="nbtn" onclick="start(10)">10</button><button class="nbtn" onclick="start(12)">12</button><button class="mbtn" onclick="setup(true)">MÁS EQUIPOS</button></div></div>
</div>
<script>
var teams = [];

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function setup(ext){
  var primary=[4,6,8,10,12], extra=[14,16,18,20,22,24];
  var opts = ext ? extra : primary;
  var btns = opts.map(function(n){ return '<button class="nbtn" onclick="start('+n+')">'+n+'</button>'; }).join('');
  var tog = ext
    ? '<button class="mbtn" onclick="setup(false)">← VOLVER</button>'
    : '<button class="mbtn" onclick="setup(true)">MÁS EQUIPOS</button>';
  document.getElementById('screen').innerHTML =
    '<div class="q">¿CUÁNTOS EQUIPOS?</div><div class="grid">'+btns+tog+'</div>';
}

function start(n){
  teams = [];
  for(var i=1;i<=n;i++) teams.push({num:i, name:'', bills:''});
  scorer();
}

function scorer(){
  var rows = teams.map(function(t){
    return '<div class="trow">'+
      '<div style="display:flex;align-items:center;justify-content:center"><div class="tnum">'+t.num+'</div></div>'+
      '<input class="iname" type="text" inputmode="text" autocomplete="off" placeholder="Nombre" value="'+esc(t.name)+'" onchange="saveName('+t.num+',this.value)">'+
      '<input class="ibills" type="number" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="0" value="'+esc(t.bills)+'" onchange="saveBills('+t.num+',this.value)">'+
    '</div>';
  }).join('');
  document.getElementById('screen').innerHTML =
    '<button class="backbtn" onclick="setup(false)">← Cambiar número de equipos</button>'+
    '<div class="thead"><span style="text-align:center">#</span><span>Equipo</span><span style="text-align:right">Billetes</span></div>'+
    rows+
    '<button class="pbtn" onclick="collectAndPodium()">VER PODIO</button>';
}

function saveName(num, val){
  var t = teams.find(function(x){ return x.num===num; });
  if(t) t.name = val;
}

function saveBills(num, val){
  var t = teams.find(function(x){ return x.num===num; });
  if(t) t.bills = val;
}

function collectAndPodium(){
  // Collect current values from DOM before switching screen
  document.querySelectorAll('.trow').forEach(function(row){
    var ni = row.querySelector('.iname');
    var bi = row.querySelector('.ibills');
    if(!ni||!bi) return;
    var num = parseInt(ni.getAttribute('onchange').match(/\d+/)[0]);
    var t = teams.find(function(x){ return x.num===num; });
    if(t){ t.name=ni.value; t.bills=bi.value; }
  });
  podium();
}

function podium(){
  var sorted = teams.slice().sort(function(a,b){
    return (parseInt(b.bills)||0)-(parseInt(a.bills)||0);
  });

  var medals=['🥇','🥈','🥉'];
  var plabels=['1ER PUESTO','2º PUESTO','3ER PUESTO'];
  // podium visual order: 2nd left, 1st center, 3rd right
  var podOrder = [sorted[1],sorted[0],sorted[2]].filter(Boolean);

  var podHtml = podOrder.map(function(t){
    var rank = sorted.indexOf(t);
    return '<div class="pblock place-'+(rank+1)+'">'+
      '<div class="plabel">'+plabels[rank]+'</div>'+
      '<div class="peq">Equipo '+t.num+'</div>'+
      '<div class="pname">'+esc(t.name||'Equipo '+t.num)+'</div>'+
      '<div class="pbills">'+(parseInt(t.bills)||0)+' B</div>'+
      '<div class="pstand"><span class="pmedal">'+medals[rank]+'</span></div>'+
    '</div>';
  }).join('');

  var rankHtml = sorted.map(function(t,i){
    var pc = i===0?'p1':i===1?'p2':i===2?'p3':'';
    var rc = i===0?'r1':i===1?'r2':i===2?'r3':'';
    return '<div class="rrow '+rc+'">'+
      '<span class="rpos '+pc+'">'+(i+1)+'º</span>'+
      '<div class="rtnum">'+t.num+'</div>'+
      '<span class="rname">'+esc(t.name||'Equipo '+t.num)+'</span>'+
      '<span class="rbills">'+(parseInt(t.bills)||0)+'</span>'+
    '</div>';
  }).join('');

  document.getElementById('screen').innerHTML =
    '<div class="slabel">PODIO FINAL</div>'+
    '<div class="podwrap">'+podHtml+'</div>'+
    '<div class="divider"></div>'+
    '<div class="slabel">CLASIFICACIÓN</div>'+
    rankHtml+
    '<button class="backbtn2" onclick="scorer()">← Volver a editar</button>';
}

setup(false);
</script>


</body></html>
